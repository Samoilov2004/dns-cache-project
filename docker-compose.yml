services:
  redis:
    image: redis:7
    container_name: dns-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  unbound:
    build: ./unbound
    container_name: dns-unbound
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      RETURN_TTL: 60
    ports:
      - "2053:53/udp"
      - "2053:53/tcp"
    restart: unless-stopped

volumes:
  redis_data:
