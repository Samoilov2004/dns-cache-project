server:
    interface: 0.0.0.0
    port: 53
    access-control: 0.0.0.0/0 allow

    verbosity: 1
    logfile: ""

    directory: "/etc/unbound"
    root-hints: "/etc/unbound/root.hints"
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    module-config: "validator iterator"

    prefetch: no
    serve-expired: no

    cache-min-ttl: 3600
    cache-max-ttl: 86400

    rrset-cache-size: 256k
    msg-cache-size: 128k

    hide-identity: yes
    hide-version: yes

    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes
