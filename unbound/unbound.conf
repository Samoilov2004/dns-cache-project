server:
    chroot: ""
    username: ""
    directory: "/usr/local/etc/unbound"

    interface: 0.0.0.0
    port: 53
    access-control: 0.0.0.0/0 allow

    verbosity: 2
    logfile: ""

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    hide-identity: yes
    hide-version: yes

    root-hints: "/usr/local/etc/unbound/root.hints"
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Для 1.2 сначала python, потом обычная логика
    module-config: "python validator iterator"

    # Для чистоты эксперимента по Redis
    prefetch: no
    serve-expired: no
    cache-min-ttl: 0
    cache-max-ttl: 86400

    rrset-cache-size: 64m
    msg-cache-size: 32m

python:
    python-script: "/opt/unbound/redis_pythonmod.py"
