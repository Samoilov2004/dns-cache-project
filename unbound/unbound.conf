server:
    interface: 0.0.0.0
    port: 53

    # Разрешаем запросы из Docker-сети и локально
    access-control: 0.0.0.0/0 allow

    # Логи
    verbosity: 1
    logfile: ""

    # Базовые каталоги
    directory: "/etc/unbound"

    # DNSSEC
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Корневые серверы
    root-hints: "/etc/unbound/root.hints"

    # Производительность / кэш
    prefetch: yes
    rrset-cache-size: 128m
    msg-cache-size: 64m

    # Для экспериментов с TTL
    cache-min-ttl: 0
    cache-max-ttl: 86400

    # Полезно для демонстрации "устаревших" ответов
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-reply-ttl: 30

    # Сокрытие лишнего
    hide-identity: yes
    hide-version: yes

    # IPv4/IPv6
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # Локальная тестовая зона для будущего раздела 1.3
    # Пока можно оставить закомментированной
    # local-zone: "example.org." static
    # local-data: "example.org. 3600 IN A 10.10.10.10"
