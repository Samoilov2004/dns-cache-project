# =============================================================================
# 1.3. Подмена зоны с DNSSEC — yandex.ru
#
# yandex.ru находится под DNSSEC-подписанным TLD .ru (алгоритм RSA/SHA-256).
# Зона объявлена как "static": Unbound отвечает исключительно из local-data,
# не обращаясь к авторитетным серверам ns1.yandex.ru / ns2.yandex.ru.
#
# Подставные IP намеренно взяты из TEST-NET (RFC 5737, 192.0.2.0/24) —
# диапазон зарезервирован для документации и никогда не используется в
# публичном DNS. Реальные IP yandex.ru: 77.88.55.77, 77.88.55.88.
# Расхождение однозначно доказывает, что ответ пришёл из локальной зоны.
# =============================================================================

# --- 1.3.А : выбранная DNSSEC-зона размещена локально на резолвере ---
# --- 1.3.Б : тип "static" запрещает обращение к авторитетным серверам ---
local-zone: "yandex.ru." static

# --- 1.3.В : локальное описание зоны (собрано скриптом collect_zone.py) ---

# A-записи с подставными адресами
local-data: "yandex.ru.     300 IN A 192.0.2.1"
local-data: "www.yandex.ru. 300 IN A 192.0.2.2"
local-data: "mail.yandex.ru. 300 IN A 192.0.2.3"
local-data: "maps.yandex.ru. 300 IN A 192.0.2.4"

# NS-записи (совпадают с реальными, подтверждают принадлежность зоны)
local-data: "yandex.ru. 300 IN NS ns1.yandex.ru."
local-data: "yandex.ru. 300 IN NS ns2.yandex.ru."

# MX-запись
local-data: "yandex.ru. 300 IN MX 10 mx.yandex.ru."

# TXT SPF
local-data: "yandex.ru. 300 IN TXT \"v=spf1 redirect=_spf.yandex.ru\""
